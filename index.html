<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sheryl Joy Lita | Instructional Design Portfolio</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->

    <!-- Font -->

    <style>
        body { font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }

</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>

            Users: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,

            Layers: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
            Mail: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>,
            Linkedin: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>,
            ChevronRight: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="9 18 15 12 9 6"/></svg>,
            Cpu: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>,
            FileText: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>,
            Play: (props) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="5 3 19 12 5 21 5 3"/></svg>
        };

        // --- PROJECT DATA ---
        // I have pre-filled the images with high-quality stock photos that work instantly.
        
        const PROJECTS = [
            {
                id: 1,
                title: "FinTech Solutions",
                client: "Leading FinTech Unicorn",
                category: "E-Learning",
                tools: ["Articulate Storyline", "Driver Analysis", "Tool Simulation"],
                description: "Developed a 'Safe Sandbox' simulation environment for agents to practice dispute handling without risk. Utilizing deep-dive Training Needs Analysis, we identified specific gaps in notation templates and decision-making.",

                // Image: Modern Data Dashboard
                image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&w=800&q=80",
                video: "", 
                placeholderColor: "bg-emerald-600"
            },
            {
                id: 2,
                title: "Immersive Flight Simulation",
                client: "Internal Innovation",
                category: "Gamification",
                tools: ["Unreal Engine 5", "Blueprint Scripting", "3D Modeling"],
                description: "A fully interactive 3D flight and aviation simulation game developed solo in Unreal Engine 5. This project demonstrates high-fidelity graphics and complex interactive mechanics, proving that corporate training can match the engagement levels of commercial video games.",

                placeholderColor: "bg-sky-600"

                title: "Maritime Full Curriculum Revamp",
                client: "Global Cruise Line",
                category: "Immersive Tech",
                tools: ["Meta/VR", "Blender", "Unreal Engine"],
                description: "Designed a hybrid safety curriculum for service personnel. Integrated VR/Meta learning games to simulate emergency muster station procedures and safety guidelines, allowing crew members to build muscle memory before boarding the vessel.",

                image: "https://images.unsplash.com/photo-1548574505-5e239809ee19?auto=format&fit=crop&w=800&q=80",
                video: "",
                placeholderColor: "bg-indigo-900"
            },

                title: "Curriculum Architecture and TNA",
                client: "Healthcare & Various Verticals",
                category: "Instructional Design",

                video: "",
                placeholderColor: "bg-slate-500"

            { name: "UE5 & Gamification", icon: <Icons.Gamepad2 className="w-6 h-6" />, desc: "Unreal Engine 5, Blueprints, Interactive 3D Environments" },
            { name: "Video & AI", icon: <Icons.Video className="w-6 h-6" />, desc: "Vyond, Synthesia, Premiere Pro, GenAI workflows" },
            { name: "Visual Design", icon: <Icons.PenTool className="w-6 h-6" />, desc: "Canva, UI/UX for Learning, Facilitator Guides (FG)" },
            { name: "Project Lead", icon: <Icons.Users className="w-6 h-6" />, desc: "Stakeholder Mgmt, Defect Analysis, KPI Alignment" },
        ];

        function Portfolio() {
            const [activeTab, setActiveTab] = useState("All");
            const [selectedProject, setSelectedProject] = useState(null);

            const categories = ["All", "Instructional Design", "E-Learning", "Gamification", "Immersive Tech"];
            const filteredProjects = activeTab === "All" 
                ? PROJECTS 
                : PROJECTS.filter(p => p.category === activeTab);

                <nav className="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800">
                    <div className="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
                    <div className="font-bold text-2xl tracking-tighter text-cyan-400">
                        ID<span className="text-white">.Dev</span>
                    </div>
                    <div className="hidden md:flex gap-8 text-sm font-medium text-slate-400">

                        <a href="#expertise" className="hover:text-cyan-400 transition-colors">Expertise</a>
                        <a href="#work" className="hover:text-cyan-400 transition-colors">Work</a>
                        <a href="#contact" className="hover:text-cyan-400 transition-colors">Contact</a>
                    </div>
                    <a href="#contact" className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-semibold rounded-full transition-all">
                        Let's Talk
                    </a>
                    </div>
                </nav>

                {/* Hero Section */}

                    <div className="absolute top-0 right-0 w-1/2 h-full bg-cyan-500/10 blur-3xl rounded-full -translate-y-1/4 translate-x-1/4 pointer-events-none"></div>

                    <div className="max-w-6xl mx-auto relative z-10">
                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-cyan-400 text-xs font-bold uppercase tracking-wider mb-6">
                        <Icons.Cpu className="w-3 h-3" />
                        Instructional Design meets Unreal Engine 5
                    </div>
                    <h1 className="text-5xl md:text-7xl font-bold leading-tight mb-6">
                        Designing Learning <br />
                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600">
                        Beyond the Slide.
                        </span>
                    </h1>
                    <p className="text-lg md:text-xl text-slate-400 max-w-2xl mb-10 leading-relaxed">

                        high-fidelity <strong>Unreal Engine</strong> gamification.

                        </a>
                        <a href="#expertise" className="px-8 py-4 bg-slate-800 border border-slate-700 text-white font-bold rounded-lg hover:bg-slate-700 transition-all text-center">
                        My Tech Stack
                        </a>
                    </div>
                    </div>
                </header>

                    <div className="max-w-6xl mx-auto px-6 py-8 grid grid-cols-2 md:grid-cols-4 gap-8 text-center md:text-left">

                        <div className="text-sm text-slate-500 uppercase tracking-wide">Years Experience</div>
                    </div>

                    </div>

                <section id="expertise" className="py-24 px-6 bg-slate-900">
                    <div className="max-w-6xl mx-auto">
                    <div className="mb-16">
                        <h2 className="text-3xl font-bold mb-4">Core Competencies</h2>
                        <p className="text-slate-400 max-w-2xl">
                        My background as an L&D Officer ensures I understand the "Why" behind the training, 
                        while my technical skills allow me to execute the "How" at the highest level.
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                            <div className="w-12 h-12 bg-slate-900 rounded-lg flex items-center justify-center text-cyan-400 mb-4 group-hover:scale-110 transition-transform">
                            {skill.icon}
                            </div>
                            <h3 className="text-xl font-bold mb-2">{skill.name}</h3>
                            <p className="text-slate-400 text-sm">{skill.desc}</p>
                        </div>
                        ))}
                    </div>
                    </div>
                </section>

                {/* Portfolio Section */}
                <section id="work" className="py-24 px-6 bg-slate-950">
                    <div className="max-w-6xl mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                        <div>
                        <h2 className="text-3xl font-bold mb-2">Featured Projects</h2>
                        <p className="text-slate-400">Selected works across Healthcare, FinTech, and Travel.</p>
                        </div>
                        
                        {/* Filter Tabs */}
                        <div className="flex flex-wrap gap-2">
                        {categories.map((cat) => (
                            <button
                            key={cat}
                            onClick={() => setActiveTab(cat)}
                            className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${
                                activeTab === cat 
                                ? "bg-cyan-600 text-white" 
                                : "bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white"
                            }`}
                            >
                            {cat}
                            </button>
                        ))}
                        </div>
                    </div>

                    {/* Project Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        {filteredProjects.map((project) => (
                        <div 
                            key={project.id} 
                            className="project-card group relative bg-slate-900 rounded-xl overflow-hidden border border-slate-800 hover:border-cyan-500/30 transition-all cursor-pointer flex flex-col"

                        >
                            {/* Image Placeholder */}

                                <div className="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition-all"></div>
                                
                                {/* Video Preview (if video exists and hovering) */}

                                    <video

                                        muted 
                                        loop 
                                        playsInline 
                                        className="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition-opacity"
                                        onMouseOver={event => event.target.play()}
                                        onMouseOut={event => event.target.pause()}
                                    />
                                )}

                                {project.title.includes("Flight") || project.video ? (
                                    <Icons.Play className="play-icon w-16 h-16 text-white/90 relative z-10 transition-transform drop-shadow-lg" />

                                    !project.image && (
                                        <span className="relative z-10 font-bold text-white/50 text-2xl uppercase tracking-widest group-hover:text-white group-hover:scale-110 transition-all duration-500">

                                        </span>
                                    )
                                )}
                            </div>

                            <div className="flex flex-wrap gap-2 mt-auto">
                                {project.tools.slice(0, 3).map((t, i) => (
                                <span key={i} className="px-2 py-1 bg-slate-800 rounded text-xs text-slate-300 border border-slate-700">
                                    {t}
                                </span>
                                ))}
                            </div>
                            </div>
                        </div>
                        ))}

                </section>

                {/* Experience Timeline Mini-Section */}
                <section className="py-24 px-6 bg-slate-900">
                    <div className="max-w-4xl mx-auto">
                    <div className="text-center mb-12">
                        <h2 className="text-3xl font-bold">My Journey</h2>
                    </div>
                    <div className="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-700 before:to-transparent">
                        
                        {/* Job 2 */}
                        <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                        <div className="flex items-center justify-center w-10 h-10 rounded-full border border-slate-700 bg-slate-900 group-[.is-active]:border-cyan-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2">

                        </div>
                        <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-6 rounded-xl border border-slate-700 bg-slate-800 shadow-sm">

                            <div className="font-bold text-white">Instructional Design Lead</div>
                            <time className="font-caveat font-medium text-cyan-400 text-sm">Present</time>
                            </div>
                            <div className="text-slate-400 text-sm mb-2">Content Development Team</div>
                            <p className="text-slate-300 text-sm">
                            Spearheading TNA and curriculum design for major clients in Healthcare and FinTech. Introduced 3D gamification tools (UE5, Blender) to the department, developing projects like 'Immersive Flight Simulation' and safety VR simulations.
                            </p>
                        </div>
                        </div>

                        {/* Job 1 */}
                        <div className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group">
                        <div className="flex items-center justify-center w-10 h-10 rounded-full border border-slate-700 bg-slate-900 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2">
                            <Icons.Layers className="w-5 h-5 text-slate-500"/>
                        </div>
                        <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] p-6 rounded-xl border border-slate-700 bg-slate-800 shadow-sm">
                            <div className="flex justify-between items-center mb-1">
                            <div className="font-bold text-white">L&D Officer</div>
                            <time className="font-caveat font-medium text-slate-500 text-sm">Past</time>
                            </div>
                            <div className="text-slate-400 text-sm mb-2">Corporate Training Dept</div>
                            <p className="text-slate-300 text-sm">
                            Facilitated ILT sessions and managed LMS administration. Transitioned into content development by self-learning Articulate Storyline and visual design principles.
                            </p>
                        </div>
                        </div>

                    </div>
                    </div>
                </section>

                <section id="contact" className="py-24 px-6 bg-slate-950 border-t border-slate-800">
                    <div className="max-w-4xl mx-auto text-center">
                    <h2 className="text-4xl font-bold mb-6">Ready to create impact?</h2>
                    <p className="text-slate-400 mb-10 text-lg">
                        I am currently available for Instructional Design and Content Development roles.
                        I will provide full access to my source files, TNA reports, and the playable demo of the flight simulation upon request.
                    </p>
                    
                    <div className="flex flex-col md:flex-row gap-6 justify-center items-center">
                        <a href="mailto:sheryljoylita@gmail.com" className="flex items-center gap-3 px-8 py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-lg transition-all font-semibold w-full md:w-auto justify-center">
                        <Icons.Mail className="w-5 h-5" />
                        sheryljoylita@gmail.com
                        </a>
                        <a href="https://linkedin.com/in/joy-lita" target="_blank" rel="noreferrer" className="flex items-center gap-3 px-8 py-4 bg-slate-800 border border-slate-700 hover:bg-slate-700 text-white rounded-lg transition-all font-semibold w-full md:w-auto justify-center">
                        <Icons.Linkedin className="w-5 h-5" />
                        LinkedIn Profile
                        </a>
                        
                        {/* CV DOWNLOAD BUTTON - Ensure the file "Sheryl_Joy_Lita_CV.pdf" is in the same folder */}
                        <a href="Sheryl_Joy_Lita_CV.pdf" download className="flex items-center gap-3 px-8 py-4 bg-slate-800 border border-slate-700 hover:bg-slate-700 text-white rounded-lg transition-all font-semibold w-full md:w-auto justify-center">
                            <Icons.FileText className="w-5 h-5" />
                            Download CV
                        </a>
                    </div>
                    </div>
                </section>

                {/* Project Detail Modal */}
                {selectedProject && (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center px-4 bg-black/80 backdrop-blur-sm" onClick={() => setSelectedProject(null)}>
                    <div className="bg-slate-900 border border-slate-700 max-w-2xl w-full rounded-2xl p-8 relative shadow-2xl" onClick={e => e.stopPropagation()}>
                        <button 
                        onClick={() => setSelectedProject(null)}
                        className="absolute top-4 right-4 text-slate-400 hover:text-white"
                        >
                        Close
                        </button>
                        
                        {/* Modal Image/Video */}
                        <div className={`h-64 w-full ${selectedProject.placeholderColor} rounded-xl mb-6 flex items-center justify-center bg-cover bg-center`}
                             style={{ backgroundImage: selectedProject.image ? `url(${selectedProject.image})` : 'none' }}>
                            {selectedProject.video ? (
                                <video 
                                    src={selectedProject.video} 
                                    controls 
                                    className="w-full h-full rounded-xl object-cover"
                                />
                            ) : (
                                selectedProject.title.includes("Flight") && <Icons.Play className="w-16 h-16 text-white/80 drop-shadow-xl" />
                            )}
                        </div>

                        <div className="flex items-center gap-3 mb-2">
                        <span className="text-cyan-400 text-sm font-bold uppercase">{selectedProject.client}</span>
                        <span className="text-slate-500 text-sm">•</span>
                        <span className="text-slate-400 text-sm">{selectedProject.category}</span>
                        </div>
                        <h2 className="text-3xl font-bold mb-4">{selectedProject.title}</h2>
                        <div className="mb-6">
                        <h4 className="text-sm font-bold text-white mb-2 uppercase">The Challenge & Solution</h4>
                        <p className="text-slate-300 leading-relaxed">{selectedProject.description}</p>
                        </div>
                        <div className="mb-6 p-4 bg-slate-800 rounded-lg border border-slate-700">
                        <h4 className="text-sm font-bold text-cyan-400 mb-1 uppercase">Business Impact</h4>
                        <p className="text-white font-medium">{selectedProject.impact}</p>
                        </div>
                        <div className="flex flex-wrap gap-2">
                        {selectedProject.tools.map((t, i) => (
                            <span key={i} className="px-3 py-1 bg-slate-950 rounded border border-slate-800 text-xs text-slate-400">
                            {t}
                            </span>
                        ))}
                        </div>
                    </div>
                    </div>
                )}

                {/* Footer */}
                <footer className="py-8 text-center text-slate-600 text-sm bg-slate-950">
                    <p>© {new Date().getFullYear()} Portfolio.</p>
                </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Portfolio />);
    </script>
</body>

</html>
